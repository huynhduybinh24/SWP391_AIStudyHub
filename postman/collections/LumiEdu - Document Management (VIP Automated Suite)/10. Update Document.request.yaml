$kind: http-request
url: http://localhost:8080/api/documents/{{documentId}}
method: PUT
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "title": "Tai lieu cap nhat VIP",
      "description": "Cap nhat kịch bản test",
      "visibility": "PRIVATE"
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      // 1. Status Code & Performance Tests
      pm.test("TC-10-A | HTTP Status is 200 OK", function () {
          pm.response.to.have.status(200);
      });
      pm.test("TC-10-B | Performance - Response time <800ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(800);
      });

      // 2. Data Modification Assertions
      pm.test("TC-10-C | Title and description modified successfully", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.success).to.eql(true);
          pm.expect(jsonData.message).to.eql("Document updated successfully.");
          
          var doc = jsonData.data;
          pm.expect(doc.title).to.eql("Tai lieu cap nhat VIP");
          pm.expect(doc.description).to.eql("Cap nhat kịch bản test");
          pm.expect(doc.visibility).to.eql("PRIVATE");
      });
    language: text/javascript
order: 10000
