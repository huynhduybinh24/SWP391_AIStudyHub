# Test application properties
spring.application.name=lumiedu-test

# Use in-memory H2 database for testing
spring.datasource.url=jdbc:h2:mem:lumiedu_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=false

# Auto-create/drop database schemas for testing
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Port
server.port=8081

# Mock/dummy integration properties to avoid errors during test startup
stripe.secret-key=sk_test_mock_holder
stripe.webhook-secret=whsec_mock_holder
stripe.success-url=http://localhost:8386/success
stripe.cancel-url=http://localhost:8386/cancel
stripe.bypass-checkout=true

google.client-id=dummy-client-id.apps.googleusercontent.com
google.client-secret=mock-client-secret

app.upload.dir=test-uploads

openai.api.key=mock-key
gemini.api.key=mock-gemini-key

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=lumieduteam@gmail.com
spring.mail.password=mock-password
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false

app.admin.email=lumieduteam@gmail.com

# Google Drive Configuration
google.drive.credentials-path=classpath:google-credentials.json
google.drive.folder-id=mock-folder-id
