$kind: http-request
url: http://localhost:8080/api/documents/{{documentId}}/shares
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "instructor@lumiedu.com",
      "role": "editor"
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      // 1. Status Code & Timing
      pm.test("TC-09-A | HTTP Status is 200 OK", function () {
          pm.response.to.have.status(200);
      });
      pm.test("TC-09-B | Performance - Share operation <1200ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(1200);
      });

      // 2. Share Integrity Validation
      pm.test("TC-09-C | Share details saved correctly", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.success).to.eql(true);
          pm.expect(jsonData.message).to.eql("Document share saved successfully.");
          
          var shareData = jsonData.data;
          pm.expect(shareData.documentId).to.eql(pm.globals.get("documentId"));
          pm.expect(shareData.shareeEmail).to.eql("instructor@lumiedu.com");
          pm.expect(shareData.role).to.eql("editor");
      });
    language: text/javascript
order: 9000
