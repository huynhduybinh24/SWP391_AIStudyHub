$kind: http-request
url: http://localhost:8080/api/documents/{{documentId}}/preview
method: GET
scripts:
  - type: afterResponse
    code: |-
      // 1. Status Code & Performance
      pm.test("TC-05-A | HTTP Status is 200 OK", function () {
          pm.response.to.have.status(200);
      });
      pm.test("TC-05-B | Performance - Preview download time <1500ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(1500);
      });

      // 2. Header & Binary Assertions
      pm.test("TC-05-C | Content-Type matches file type", function () {
          pm.response.to.have.header("Content-Type");
          pm.expect(pm.response.headers.get("Content-Type")).to.eql("application/pdf");
      });
      pm.test("TC-05-D | Content-Disposition is inline for browser viewing", function () {
          pm.response.to.have.header("Content-Disposition");
          pm.expect(pm.response.headers.get("Content-Disposition")).to.include("inline");
      });
    language: text/javascript
order: 5000
