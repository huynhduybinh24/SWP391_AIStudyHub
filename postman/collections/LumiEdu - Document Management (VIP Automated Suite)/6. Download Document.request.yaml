$kind: http-request
url: http://localhost:8080/api/documents/{{documentId}}/download
method: GET
scripts:
  - type: afterResponse
    code: |-
      // 1. Status Code & Performance
      pm.test("TC-06-A | HTTP Status is 200 OK", function () {
          pm.response.to.have.status(200);
      });
      pm.test("TC-06-B | Performance - File retrieval <1500ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(1500);
      });

      // 2. Header Assertions for File Download
      pm.test("TC-06-C | Content-Disposition is attachment for local saving", function () {
          pm.response.to.have.header("Content-Disposition");
          pm.expect(pm.response.headers.get("Content-Disposition")).to.include("attachment");
          pm.expect(pm.response.headers.get("Content-Disposition")).to.include("filename=");
      });
      pm.test("TC-06-D | Verify file content is present", function () {
          pm.expect(pm.response.body.length).to.be.above(0);
      });
    language: text/javascript
order: 6000
