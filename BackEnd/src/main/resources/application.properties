spring.application.name=lumiedu


# ===== PRIMARY DATABASE: MySQL =====
# Connection details (URL, username, password) are in application-local.properties
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===== H2 IN-MEMORY (chỉ dùng cho profile 'test') =====
# Để bật H2 console tạm thời debug: thêm spring.h2.console.enabled=true vào application-local.properties


spring.jpa.hibernate.ddl-auto=update
# MySQL tự tạo bảng khi chạy lần đầu. Không cần chạy SQL migration thủ công.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# Frontend URL (for email links)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_mock_holder}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_mock_holder}
stripe.success-url=http://localhost:5173/dashboard/upgrade?status=success&invoice={CHECKOUT_SESSION_ID}
stripe.cancel-url=http://localhost:5173/dashboard/upgrade?status=cancel
stripe.bypass-checkout=false

# Google OAuth2 Credentials
google.client-id=${GOOGLE_CLIENT_ID:dummy-client-id.apps.googleusercontent.com}
google.client-secret=${GOOGLE_CLIENT_SECRET:mock-client-secret}

# Increase upload and request limits for base64 image data and file uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-form-post-size=50MB

# Document Module - File upload directory (relative to working directory)
app.upload.dir=uploads

# OpenAI API Configuration
openai.api.key=${OPENAI_API_KEY:mock-key}

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY:mock-gemini-key}

# Spring Mail Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:lumieduteam@gmail.com}
# Mật khẩu ứng dụng (App Password) 16 ký tự của Google
spring.mail.password=${MAIL_PASSWORD:xagzjgkcipyihtpw}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000

# Application Admin Email Destination
app.admin.email=${ADMIN_EMAIL:lumieduteam@gmail.com}

# JWT Configuration
jwt.secret=${JWT_SECRET:dev-local-secret-change-me-before-production}
jwt.expiration-ms=86400000
jwt.refresh-expiration-ms=604800000

# Google Drive Configuration
google.drive.credentials-path=${GOOGLE_DRIVE_CREDENTIALS_PATH:classpath:google-credentials.json}
google.drive.folder-id=${GOOGLE_DRIVE_FOLDER_ID:mock-folder-id}
google.drive.client-id=${GOOGLE_DRIVE_CLIENT_ID:}
google.drive.client-secret=${GOOGLE_DRIVE_CLIENT_SECRET:}
google.drive.refresh-token=${GOOGLE_DRIVE_REFRESH_TOKEN:}

# Per-user Google Drive OAuth & Encryption settings
google.drive.oauth.redirect-uri=${GOOGLE_DRIVE_OAUTH_REDIRECT_URI:http://localhost:8080/api/integrations/google-drive/callback}
app.encryption.secret=${APP_ENCRYPTION_SECRET:}
