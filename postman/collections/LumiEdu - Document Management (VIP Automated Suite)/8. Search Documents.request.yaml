$kind: http-request
url: http://localhost:8080/api/documents/search?keyword=VIP&tag=VIP_TEST
method: GET
queryParams:
  keyword: VIP
  tag: VIP_TEST
scripts:
  - type: afterResponse
    code: |-
      // 1. Status Code & Timing
      pm.test("TC-08-A | HTTP Status is 200 OK", function () {
          pm.response.to.have.status(200);
      });
      pm.test("TC-08-B | Performance - Search operation <800ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(800);
      });

      // 2. Search Accuracy Check
      pm.test("TC-08-C | Search returns matching documents", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.success).to.eql(true);
          pm.expect(jsonData.data).to.be.an('array');
          pm.expect(jsonData.data.length).to.be.above(0);
          
          // Verify matching query tags
          var targetDoc = jsonData.data.find(d => d.id === pm.globals.get("documentId"));
          pm.expect(targetDoc).to.exist;
          pm.expect(targetDoc.title).to.include("VIP");
          pm.expect(targetDoc.tags).to.include("VIP_TEST");
      });
    language: text/javascript
order: 8000
