spring.application.name=lumiedu


spring.datasource.url=jdbc:h2:file:./data/lumiedu;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080


spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_mock_holder}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_mock_holder}
stripe.success-url=http://localhost:8386/dashboard/upgrade?status=success&invoice={CHECKOUT_SESSION_ID}
stripe.cancel-url=http://localhost:8386/dashboard/upgrade?status=cancel
stripe.bypass-checkout=false

# Google OAuth2 Credentials
google.client-id=${GOOGLE_CLIENT_ID:dummy-client-id.apps.googleusercontent.com}
google.client-secret=${GOOGLE_CLIENT_SECRET:mock-client-secret}

# Increase upload and request limits for base64 image data and file uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-form-post-size=50MB

# Document Module - File upload directory (relative to working directory)
app.upload.dir=uploads

# OpenAI API Configuration
openai.api.key=${OPENAI_API_KEY:mock-key}

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY:mock-gemini-key}

# Spring Mail Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:lumieduteam@gmail.com}
# Mật khẩu ứng dụng (App Password) 16 ký tự của Google
spring.mail.password=${MAIL_PASSWORD:xagzjgkcipyihtpw}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# Application Admin Email Destination
app.admin.email=${ADMIN_EMAIL:lumieduteam@gmail.com}



